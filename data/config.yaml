models:
  minimax:
    client_type: anthropic
    formatter: anthropic
    api_key: ${MINIMAX_API_KEY}
    model:
      - "MiniMax-M2.5"
      - "MiniMax-M2.7"
    base_url: "https://api.minimaxi.com/anthropic"
    enable_thinking: false
    stream: true
    max_iters: 90

  deepseek:
    client_type: anthropic
    formatter: anthropic
    api_key: ${DEEPSEEK_API_KEY}
    model:
      - "deepseek-v4-flash"
      - "deepseek-v4-pro"
    enable_thinking: false
    base_url: "https://api.deepseek.com/anthropic"
    stream: true
    max_iters: 90

sqlite:
  db: "memory.db"

memory:
  enabled: false
  holographic:
    dims: 1024
    ngram_min: 2
    ngram_max: 4

MCP:
  mcp-clear:
    url: "https://ai.xsearchs.com/mcp-clear/mcp"
    type: "streamable_http"
    headers:
      Authorization: ${MCP_CLEAR_TOKEN}
  mcp-csas:
    url: "https://ai.xsearchs.com/mcp-csas/mcp"
    type: "streamable_http"
    headers:
      Authorization: ${MCP_CSAS_TOKEN}
